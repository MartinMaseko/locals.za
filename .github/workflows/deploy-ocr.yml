name: Deploy OCR Service → Azure Container Apps

# Runs on every push to main that touches the OCR service or this workflow file.
# This means a frontend-only commit never triggers an OCR rebuild.
on:
  push:
    branches: [main]
    paths:
      - 'locals.za/ai-service/**'
      - '.github/workflows/deploy-ocr.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Azure login ─────────────────────────────────────────────────────
      # AZURE_CREDENTIALS is a service-principal JSON stored as a GitHub secret.
      # Generated by: az ad sp create-for-rbac --sdk-auth (see provisioning steps).
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 3. Docker Buildx (enables layer cache support) ─────────────────────
      # Buildx is Docker's modern build engine. We need it for the --cache-from/to
      # GitHub Actions cache, which means the 100 MB EasyOCR model layer is only
      # re-downloaded when requirements.txt changes — not on every push.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login to Azure Container Registry ──────────────────────────────
      # ACR_LOGIN_SERVER  = localszaacr.azurecr.io
      # ACR_USERNAME      = from: az acr credential show --name localszaacr
      # ACR_PASSWORD      = from: az acr credential show --name localszaacr
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 5. Build and push Docker image ────────────────────────────────────
      # Two tags on every push:
      #   :latest        → always the newest build (used by Container App default)
      #   :<sha>         → immutable tag per commit (useful for rollbacks)
      # cache-from/to stores Docker layers in GitHub Actions cache storage.
      # On a warm cache the full build goes from ~8 min → ~90 seconds.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./locals.za/ai-service
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/localsza-ocr:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/localsza-ocr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy new image to Azure Container App ─────────────────────────
      # This updates the Container App to use the freshly-pushed image.
      # Azure performs a rolling update — zero downtime.
      # The Container App's environment variables (SHARED_SECRET etc.) are set
      # directly in Azure and are NOT managed by this workflow file.
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: localsza-rg
          containerAppName: localsza-ocr
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/localsza-ocr:${{ github.sha }}
